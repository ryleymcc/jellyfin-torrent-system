services:
  torrent-search:
    build:
      context: ./Torrent-Search-API
    container_name: torrent-search
    restart: unless-stopped
    volumes:
      - "${REMOTE_STORAGE_ROOT:?set REMOTE_STORAGE_ROOT}/search:/search"
    networks:
      - media-net

  jellyfin:
    image: ${JELLYFIN_IMAGE:-custom-jellyfin:10.11.8-custom}
    container_name: jellyfin
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    environment:
      TZ: ${TZ:-UTC}
      JELLYFIN_PublishedServerUrl: ${JELLYFIN_PUBLISHED_URL:-}
    volumes:
      - "${REMOTE_STORAGE_ROOT:?set REMOTE_STORAGE_ROOT}/jellyfin/config:/config"
      - "${REMOTE_STORAGE_ROOT:?set REMOTE_STORAGE_ROOT}/jellyfin/cache:/cache"
      - "${REMOTE_STORAGE_ROOT:?set REMOTE_STORAGE_ROOT}/media:/media"
    depends_on:
      - torrent-search
      - qbittorrent
    networks:
      - media-net

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-UTC}
      WEBUI_PORT: ${QBITTORRENT_WEBUI_PORT:-8080}
      TORRENTING_PORT: ${QBITTORRENT_TORRENT_PORT:-6881}
    volumes:
      - "${REMOTE_STORAGE_ROOT:?set REMOTE_STORAGE_ROOT}/qbittorrent/config:/config"
      - "${REMOTE_STORAGE_ROOT:?set REMOTE_STORAGE_ROOT}/media/downloads:/downloads"
    ports:
      - "127.0.0.1:${QBITTORRENT_WEBUI_PORT:-8080}:${QBITTORRENT_WEBUI_PORT:-8080}"
      - "${QBITTORRENT_TORRENT_PORT:-6881}:${QBITTORRENT_TORRENT_PORT:-6881}"
      - "${QBITTORRENT_TORRENT_PORT:-6881}:${QBITTORRENT_TORRENT_PORT:-6881}/udp"
    networks:
      - media-net

networks:
  media-net:
    driver: bridge
